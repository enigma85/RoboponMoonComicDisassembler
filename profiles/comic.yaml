notes: >
  Comic BomBom can now be initialized, analyzed, rebuilt, progressively
  disassembled, text-dumped, translation-exported, and font-exported through
  the same command surface as Moon and Sun. Because Comic BomBom has not been
  proven byte-for-byte compatible with every Moon text/font offset, run
  text-roundtrip and a one-glyph font probe after init. If those fail, use
  analyze and bankdiff to update this profile instead of patching blindly.
